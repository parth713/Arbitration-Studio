# nginx reverse proxy for the MACT Streamlit app.
# Install: sudo cp deploy/nginx-mact.conf /etc/nginx/sites-available/mact
#          sudo ln -s /etc/nginx/sites-available/mact /etc/nginx/sites-enabled/mact
#          sudo nginx -t && sudo systemctl reload nginx
#
# Streamlit needs WebSocket upgrade headers — without the Upgrade/Connection
# lines below the page loads but stays "Please wait..." forever.

server {
    listen 80;
    server_name mact.example.com;   # <-- your Yotta domain or public IP

    # Must be >= Streamlit maxUploadSize (50 MB) so large PDF bundles upload.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required by Streamlit's /_stcore/stream)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # LLM/OCR calls can be slow — don't cut the connection.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}

# After this works on port 80, add TLS with:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d mact.example.com
# certbot rewrites this block to listen 443 with your certificate.
